# Кладётся в форк репозитория как .github/workflows/build-custom.yml
# Собирает debug-APK с нашим google-services.json. Нужен только один секрет: GOOGLE_SERVICES_JSON (base64).
# Запуск: вкладка Actions → "Build Custom APK" → Run workflow. APK — в артефактах.
name: Build Custom APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup JAVA 17
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: 17

      - name: Setup Google Services
        run: echo "${{ secrets.GOOGLE_SERVICES_JSON }}" | base64 --decode > ./app/google-services.json

      - name: Build debug APK
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: sms-gateway-apk
          path: app/build/outputs/apk/debug/*.apk
